services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_documents_backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
     - .:/app
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_documents_frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
